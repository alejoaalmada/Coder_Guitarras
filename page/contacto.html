<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../sass/styles.css">
    <link rel="icon" type="image/x-icon" href="../img/favicon.png">
    <title>La Guitarra</title>
</head>
<body>
    <header id="inicio">
        <img class="logo" src="../img/logo.png" alt="Logo de la pagina">
        <nav class="navbar">
            <ul>
                <li class="nav_it"><a href="../index.html">Inicio</a></li>
                <li class="nav_it"><a href="./evolution.html">Evolución</a></li>
                <li class="nav_it"><a href="./guitarras.html">Guitarras</a></li>
                <li class="nav_it"><a href="./guitarristas.html">Guitarristas</a></li>
                <li class="nav_it"><a href="#">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main class="main">
        <div class="intro">
            <h1>Contacto</h1>
            <h2>Nos contactemos a través de la música.</>
        </div>
    </main>

    <section>
        <form class="formulario">
    
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" placeholder="Nombre" required>

            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Correo electronico" required>

            <label for="telefono">Teléfono</label>
            <input type="tel" id="telefono" placeholder="Teléfono">

            <label for="opinion">Opinión</label>
            <textarea id="opinion" rows="5" placeholder="Recomienda música"></textarea>

            <button class="submit" type="submit">Enviar</button>

        </form>
    </section>
    
    <footer>
        <a href="https://google.com">
            <img src="../img/icons8-instagram-48.png" alt="Descripción de la imagen">
        </a>
        <a href="https://google.com">
            <img src="../img/icons8-facebook-48 (2).png" alt="Descripción de la imagen">
        </a>
        <p>Todos los derechos reservados.</p>
        <a href="#inicio" class="btn-volver">Subir</a>
    </footer>
</body>
</html>
